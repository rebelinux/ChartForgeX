name: Quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-pack:
    name: Build, test, examples, pack
    runs-on:
      - self-hosted
      - Linux
      - X64
    timeout-minutes: 20
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run quality loop
        shell: pwsh
        run: ./Build.ps1 -Configuration Release

      - name: Upload packages
        uses: actions/upload-artifact@v6
        with:
          name: chartforgex-packages
          path: |
            artifacts/packages/Release/*.nupkg
            artifacts/packages/Release/*.snupkg
          if-no-files-found: error

      - name: Upload example gallery
        uses: actions/upload-artifact@v6
        with:
          name: chartforgex-example-gallery
          path: ChartForgeX.Examples/bin/Release/net8.0/output
          if-no-files-found: error
